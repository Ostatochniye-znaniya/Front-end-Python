<!doctype html>
<html lang="ru">

<head>
    <meta charset="utf-8">
    <title>Аналитика</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <div class="stage">
        <div class="viewport">
            <div class="panel">

                <h1 class="h1">Аналитика по проверкам остаточных знаний</h1>
                <!-- ФИЛЬТР ПОДРАЗДЕЛЕНИЯ -->
                <div style="margin-top:20px;margin-bottom:20px;">

                <label>Фильтр по подразделению:</label>

                <select id="subdivisionFilter" style="margin-left:10px;padding:6px;">
                <option value="all">Все подразделения</option>
                </select>

                </div>
                <!-- ПРОГРЕСС ВЫПОЛНЕНИЯ -->
                <div style="margin-top:25px;margin-bottom:25px;">

                <h2 style="font-size:18px;margin-bottom:10px;">
                Прогресс выполнения проверок
                </h2>

                <div style="background:#e9ecef;border-radius:8px;height:25px;overflow:hidden;">
                <div id="progressBar"
                style="
                height:25px;
                width:0%;
                background:#28a745;
                text-align:center;
                color:white;
                font-weight:bold;
                line-height:25px;
                ">
                0%
                </div>
                </div>

                </div>
                <div style="display:flex;gap:24px;margin-top:24px;flex-wrap:wrap;">

                    <!-- Диаграмма по статусам -->
                    <div style="flex:1;min-width:300px;background:#ffffff;padding:20px;border-radius:8px;">
                        <h2 style="font-size:18px;margin-bottom:16px;">
                            Распределение заявок по статусам
                        </h2>
                        <canvas id="statusChart"></canvas>
                    </div>

                    <!-- Диаграмма по подразделениям -->
                    <div style="flex:1;min-width:300px;background:#ffffff;padding:20px;border-radius:8px;">
                        <h2 style="font-size:18px;margin-bottom:16px;">
                            Заявки по подразделениям
                        </h2>
                        <canvas id="subdivisionChart"></canvas>
                    </div>

                </div>

            </div>
        </div>
    </div>

    <script>
        const requests = {{ requests | tojson }};

        // ======================
        // заполнение dropdown
        // ======================

        const filter = document.getElementById("subdivisionFilter");

        const subdivisions = new Set();

        requests.forEach(r => {
            subdivisions.add(r.from_subdivision);
        });

        subdivisions.forEach(s => {

            const option = document.createElement("option");

            option.value = s;
            option.textContent = s;

            filter.appendChild(option);

        });
        
        // ======================
        // ПРОГРЕСС ВЫПОЛНЕНИЯ
        // ======================

        const totalRequests = requests.length;

        const approvedRequests = requests.filter(r => r.status === "approved").length;

        const progressPercent = totalRequests
        ? Math.round((approvedRequests / totalRequests) * 100)
        : 0;

        const progressBar = document.getElementById("progressBar");

        progressBar.style.width = progressPercent + "%";
        progressBar.textContent = progressPercent + "%";
                // ================================
        // 1️⃣ Диаграмма по статусам (1.2)
        // ================================
        const statusCounts = {};

        requests.forEach(r => {
            if (!statusCounts[r.status]) {
                statusCounts[r.status] = 0;
            }
            statusCounts[r.status]++;
        });

        const statusLabels = Object.keys(statusCounts);
        const statusValues = Object.values(statusCounts);

        const statusColors = [
            "#ffc107", // requested
            "#28a745", // approved
            "#dc3545",
            "#6c757d"
        ];

        new Chart(document.getElementById('statusChart'), {
            type: 'pie',
            data: {
                labels: statusLabels,
                datasets: [{
                    data: statusValues,
                    backgroundColor: statusColors.slice(0, statusLabels.length),
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { position: 'bottom' }
                }
            }
        });

        // ==========================================
        // 2️⃣ Диаграмма по подразделениям (1.3)
        // ==========================================
        const subdivisionCounts = {};

        requests.forEach(r => {
            const subdivision = r.from_subdivision;
            if (!subdivisionCounts[subdivision]) {
                subdivisionCounts[subdivision] = 0;
            }
            subdivisionCounts[subdivision]++;
        });

        const subdivisionLabels = Object.keys(subdivisionCounts);
        const subdivisionValues = Object.values(subdivisionCounts);

        new Chart(document.getElementById('subdivisionChart'), {
            type: 'bar',
            data: {
                labels: subdivisionLabels,
                datasets: [{
                    label: 'Количество заявок',
                    data: subdivisionValues,
                    backgroundColor: "#007bff"
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            stepSize: 1
                        }
                    }
                }
            }
        });
                
        // ======================
        // ФИЛЬТР АНАЛИТИКИ
        // ======================

        filter.addEventListener("change", () => {

            const selected = filter.value;

            let filteredRequests = requests;

            if(selected !== "all"){

                filteredRequests = requests.filter(
                    r => r.from_subdivision === selected
                );

            }

            location.reload();

        });
    </script>

</body>

</html>

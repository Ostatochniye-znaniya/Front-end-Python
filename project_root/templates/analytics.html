<!doctype html>
<html lang="ru">

<head>
    <meta charset="utf-8">
    <title>Аналитика</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <div class="stage">
        <div class="viewport">
            <div class="panel">

                <h1 class="h1">Аналитика по проверкам остаточных знаний</h1>

                <div style="display:flex;gap:24px;margin-top:24px;flex-wrap:wrap;">

                    <!-- Диаграмма по статусам -->
                    <div style="flex:1;min-width:300px;background:#ffffff;padding:20px;border-radius:8px;">
                        <h2 style="font-size:18px;margin-bottom:16px;">
                            Распределение заявок по статусам
                        </h2>
                        <canvas id="statusChart"></canvas>
                    </div>

                    <!-- Диаграмма по подразделениям (пока пустая, будет 1.3) -->
                    <div style="flex:1;min-width:300px;background:#ffffff;padding:20px;border-radius:8px;">
                        <h2 style="font-size:18px;margin-bottom:16px;">
                            Заявки по подразделениям
                        </h2>
                        <canvas id="subdivisionChart"></canvas>
                    </div>

                </div>

            </div>
        </div>
    </div>

    <script>
        // ===== Получаем данные из Flask =====
        const requests = {{ requests | tojson }};

        // ===== Подсчёт по статусам =====
        const statusCounts = {};

        requests.forEach(r => {
            if (!statusCounts[r.status]) {
                statusCounts[r.status] = 0;
            }
            statusCounts[r.status]++;
        });

        const statusLabels = Object.keys(statusCounts);
        const statusValues = Object.values(statusCounts);

        // Цвета для статусов
        const statusColors = [
            "#ffc107", // requested — жёлтый
            "#28a745", // approved — зелёный
            "#dc3545", // rejected (на будущее)
            "#6c757d"  // fallback
        ];

        // ===== Строим круговую диаграмму =====
        const ctxStatus = document.getElementById('statusChart').getContext('2d');

        new Chart(ctxStatus, {
            type: 'pie',
            data: {
                labels: statusLabels,
                datasets: [{
                    data: statusValues,
                    backgroundColor: statusColors.slice(0, statusLabels.length),
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        position: 'bottom'
                    }
                }
            }
        });
    </script>

</body>

</html>

<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Панель администратора</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="stage">
<div class="viewport">
<div class="panel">

<h1 class="h1">Панель администратора</h1>

<div style="margin-top:20px;">
    <b>Текущая роль:</b> {{ role }}
</div>

<div style="margin-top:10px;">
    <b>Период редактирования:</b>
    {% if is_edit_period %}
        <span style="color:green;">Открыт</span>
    {% else %}
        <span style="color:red;">Закрыт</span>
    {% endif %}
</div>

<!-- ПЕРЕКЛЮЧЕНИЕ РОЛИ -->
<form method="post" action="/set-role" style="margin-top:20px;">

<label>Выбрать роль:</label>

<select name="role">
    <option value="head">Заведующий</option>
    <option value="faculty">Факультет</option>
    <option value="teacher">Преподаватель</option>
    <option value="guest">Гость</option>
</select>

<button class="btn">Применить</button>

</form>

</div>
</div>
</div>

</body>
</html>

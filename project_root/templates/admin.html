{% extends "base.html" %}
{% block title %}Панель администратора{% endblock %}

{% block content %}
<h1 class="h1">Панель администратора</h1>

<div style="margin-top:20px;">
    <b>Текущая роль:</b> {{ role }}
</div>

<div style="margin-top:10px;">
    <b>Период редактирования:</b>
    {% if is_edit_period %}
        <span style="color:green;">Открыт</span>
    {% else %}
        <span style="color:red;">Закрыт</span>
    {% endif %}
</div>

<form method="post" action="/set-role" style="margin-top:20px;">
    <label>Выбрать роль:</label>
    <select name="role">
        <option value="head" {% if role == "head" %}selected{% endif %}>Заведующий кафедрой</option>
        <option value="faculty" {% if role == "faculty" %}selected{% endif %}>Ответственный факультета</option>
        <option value="teacher" {% if role == "teacher" %}selected{% endif %}>Преподаватель</option>
        <option value="guest" {% if role == "guest" %}selected{% endif %}>Гость</option>
    </select>
    <button class="btn" style="margin-left:10px;">Применить</button>
</form>

<form method="post" action="/toggle-period" style="margin-top:20px;">
    <button class="btn">
        {% if is_edit_period %}Закрыть период{% else %}Открыть период{% endif %}
    </button>
</form>
{% endblock %}

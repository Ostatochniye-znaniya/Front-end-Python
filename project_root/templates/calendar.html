<!doctype html>
<html lang="ru">

<head>
<meta charset="utf-8">
<title>Календарь проверок</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="stage">
<div class="viewport">
<div class="panel">

<h1 class="h1">Календарь проверок</h1>

<table class="groups">

<thead>
<tr>
<th>Дата</th>
<th>Группа</th>
<th>Дисциплина</th>
<th>Преподаватель</th>
<th>Статус</th>
</tr>
</thead>

<tbody>

{% for s in schedule %}

<tr>
<td>{{ s.date }}</td>
<td>{{ s.group }}</td>
<td>{{ s.discipline }}</td>
<td>{{ s.teacher }}</td>
<td>

{% if s.status == "confirmed" %}

<span style="
padding:4px 8px;
border-radius:6px;
background:#e6fffa;
color:#065f46;
font-size:13px;
font-weight:600;
">
Назначено
</span>

{% elif s.status == "planned" %}

<span style="
padding:4px 8px;
border-radius:6px;
background:#fff3cd;
color:#856404;
font-size:13px;
font-weight:600;
">
Планируется
</span>

{% else %}

<span style="
padding:4px 8px;
border-radius:6px;
background:#e2e3e5;
color:#383d41;
font-size:13px;
font-weight:600;
">
{{ s.status }}
</span>

{% endif %}

</td>
</tr>

{% endfor %}

</tbody>

</table>

</div>
</div>
</div>

</body>

</html>

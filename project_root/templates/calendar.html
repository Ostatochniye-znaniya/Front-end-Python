<!doctype html>
<html lang="ru">

<head>
<meta charset="utf-8">
<title>Календарь проверок</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="stage">
<div class="viewport">
<div class="panel">

<h1 class="h1">Календарь проверок</h1>

<table class="groups">

<thead>
<tr>
<th>Дата</th>
<th>Группа</th>
<th>Дисциплина</th>
<th>Преподаватель</th>
<th>Статус</th>
</tr>
</thead>

<tbody>

{% for s in schedule %}

<tr>
<td>{{ s.date }}</td>
<td>{{ s.group }}</td>
<td>{{ s.discipline }}</td>
<td>{{ s.teacher }}</td>
<td>{{ s.status }}</td>
</tr>

{% endfor %}

</tbody>

</table>

</div>
</div>
</div>

</body>

</html>
